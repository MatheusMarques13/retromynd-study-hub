<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetroMynd — Study Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#EEF4FB;--paper:#FFFDF8;--pink:#FF6B9D;--pink-hover:#FF4F88;--blue:#6DBDE8;--text:#1E293B;--text-mid:#475569;--text-light:#94A3B8;--radius:6px;--shadow:0 1px 3px rgba(0,0,0,.05),0 4px 14px rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3','Source Sans Pro',system-ui,sans-serif;font-size:16px;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-weight:400;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.stars{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.star{position:absolute;width:4px;height:4px;border-radius:1px;opacity:.15;animation:blink var(--dur,3s) ease-in-out infinite var(--delay,0s)}
.star:nth-child(odd){background:var(--pink)}
.star:nth-child(even){background:var(--blue)}
@keyframes blink{0%,100%{opacity:.1;transform:scale(1)}50%{opacity:.35;transform:scale(var(--scale,1.2))}}
.pixel-heart{width:60px;height:60px;display:grid;grid-template-columns:repeat(9,1fr);gap:1px;margin:0 auto 16px;animation:hb 2s ease-in-out infinite}
.ph{width:100%;aspect-ratio:1;border-radius:1px}
.ph.p{background:var(--pink)}.ph.t{background:transparent}.ph.w{background:rgba(255,255,255,.6)}
@keyframes hb{0%,100%{transform:scale(1)}15%{transform:scale(1.08)}30%{transform:scale(1)}45%{transform:scale(1.05)}60%{transform:scale(1)}}
.brand{position:fixed;top:20px;left:22px;z-index:10}
.brand span{font-family:'Source Code Pro',monospace;font-size:8px;font-weight:500;color:var(--blue);letter-spacing:3px;opacity:.5;text-transform:uppercase}
.landing-card{position:relative;z-index:1;width:100%;max-width:420px;background:var(--paper);border:1px solid #E5E0DA;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;animation:fadeUp .5s ease;text-align:center;padding:32px 28px 28px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.clock{font-family:'Source Sans 3',sans-serif;font-size:clamp(3.5rem,14vw,5.5rem);font-weight:700;color:var(--text);letter-spacing:-3px;line-height:1;margin-bottom:8px}
.greeting{font-family:'Source Sans 3',sans-serif;font-size:1rem;font-weight:600;color:var(--text-mid);margin-bottom:12px;line-height:1.5}
.quote{font-family:'Source Serif 4','Georgia',serif;font-size:.875rem;font-style:italic;font-weight:400;color:var(--text-light);line-height:1.6;margin-bottom:24px}
.enter-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;font-family:'Source Sans 3',sans-serif;font-size:1.05rem;font-weight:600;padding:11px 36px;border:none;border-radius:8px;background:var(--pink);color:#fff;cursor:pointer;text-decoration:none;box-shadow:0 3px 12px rgba(255,107,157,.3);transition:all .2s}
.enter-btn:hover{background:var(--pink-hover);transform:translateY(-2px);box-shadow:0 5px 20px rgba(255,107,157,.4)}
.enter-btn:active{transform:translateY(1px)}
.card-footer{text-align:center;padding:12px 0 0;border-top:1px dashed #E8E4DF;margin-top:20px}
.card-footer span{font-family:'Source Code Pro',monospace;font-size:7px;font-weight:500;color:var(--text-light);letter-spacing:1.5px;text-transform:uppercase}
.bottom-text{position:fixed;bottom:20px;font-family:'Source Code Pro',monospace;font-size:7px;font-weight:500;color:var(--text-light);letter-spacing:2px;opacity:.3;z-index:1;text-transform:uppercase}
.retro-toggle{position:fixed;bottom:20px;right:20px;z-index:100}
@media(max-width:480px){
  body{padding:16px}
  .landing-card{max-width:100%}
  .clock{letter-spacing:-2px}
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="brand"><span>RETROMYND</span></div>

<div class="landing-card">
  <div class="pixel-heart">
    <div class="ph t"></div><div class="ph p"></div><div class="ph p"></div><div class="ph t"></div><div class="ph t"></div><div class="ph t"></div><div class="ph p"></div><div class="ph p"></div><div class="ph t"></div>
    <div class="ph p"></div><div class="ph w"></div><div class="ph p"></div><div class="ph p"></div><div class="ph t"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div>
    <div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div>
    <div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div>
    <div class="ph t"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph t"></div>
    <div class="ph t"></div><div class="ph t"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph t"></div><div class="ph t"></div>
    <div class="ph t"></div><div class="ph t"></div><div class="ph t"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph t"></div><div class="ph t"></div><div class="ph t"></div>
    <div class="ph t"></div><div class="ph t"></div><div class="ph t"></div><div class="ph t"></div><div class="ph p"></div><div class="ph t"></div><div class="ph t"></div><div class="ph t"></div><div class="ph t"></div>
  </div>

  <div class="clock" id="clock"></div>
  <div class="greeting" id="greeting"></div>
  <div class="quote" id="quote"></div>

  <a href="/login.html" class="enter-btn" id="enterBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    Entrar no Hub
  </a>

  <div class="card-footer"><span>RETROMYND STUDY HUB</span></div>
</div>

<div class="bottom-text">RETROMYND © 2026 • MATHEUS MARQUES</div>

<button class="retro-toggle" onclick="toggleRetroMode()">RETRO</button>

<script>
(function(){
  const c = document.getElementById('stars');
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--dur', (2 + Math.random() * 3) + 's');
    s.style.setProperty('--delay', Math.random() * 3 + 's');
    s.style.setProperty('--scale', (1.1 + Math.random() * 0.4));
    c.appendChild(s);
  }
})();

const quotes = [
  '"Success all depends on the second letter."',
  '"The only way to do great work is to love what you do."',
  '"Don\'t watch the clock; do what it does. Keep going."',
  '"Study hard what interests you the most in the most undisciplined, irreverent way possible."',
  '"The beautiful thing about learning is that nobody can take it away from you."',
  '"It does not matter how slowly you go as long as you do not stop."',
  '"A person who never made a mistake never tried anything new."',
  '"Education is the most powerful weapon you can use to change the world."',
  '"The expert in anything was once a beginner."',
  '"Push yourself, because no one else is going to do it for you."',
  '"Dream big. Start small. Act now."',
  '"Code is like humor. When you have to explain it, it\'s bad."',
  '"First, solve the problem. Then, write the code."',
  '"Talk is cheap. Show me the code."',
];
document.getElementById('quote').textContent = quotes[Math.floor(Math.random() * quotes.length)];

function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2, '0');
  const m = now.getMinutes().toString().padStart(2, '0');
  document.getElementById('clock').textContent = h + ':' + m;
}

function updateGreeting() {
  const now = new Date();
  const h = now.getHours();
  let period = 'Boa noite';
  if (h >= 5 && h < 12) period = 'Bom dia';
  else if (h >= 12 && h < 18) period = 'Boa tarde';

  let firstName = '';
  const rawName = localStorage.getItem('rmUserName');
  const rawUser = localStorage.getItem('rms_user');
  if (rawName) {
    firstName = rawName.split(' ')[0];
  } else if (rawUser) {
    try { firstName = (JSON.parse(rawUser).name || '').split(' ')[0]; } catch(e) {}
  }
  const nameStr = firstName ? ', ' + firstName : '';

  const days = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
  const day = days[now.getDay()];
  document.getElementById('greeting').innerHTML =
    period + nameStr + '!<br>' +
    '<span style="font-weight:400;color:var(--text-light);font-size:.875rem">Pronto(a) para ' + day + '? Vai que é seu dia!</span>';
}

updateClock();
updateGreeting();
setInterval(updateClock, 1000);
setInterval(updateGreeting, 60000);

(function() {
  const token = localStorage.getItem('token');
  const session = localStorage.getItem('sb-session') || localStorage.getItem('supabase.auth.token');
  if (token || session) {
    document.getElementById('enterBtn').href = '/index.html';
    document.getElementById('enterBtn').innerHTML =
      '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Abrir Study Hub';
  }
})();

window.toggleRetroMode = window.toggleRetroMode || function() {};
</script>
<script src="/js/retro-mode.js"></script>
</body>
</html>
