<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetroMynd — Study Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-overlay: rgba(0,0,0,0.25);
  --text-main: #fff;
  --text-dim: rgba(255,255,255,0.7);
  --text-muted: rgba(255,255,255,0.45);
  --accent: #FF6B9D;
  --accent-soft: rgba(255,107,157,0.25);
  --glass: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.12);
  --glass-hover: rgba(255,255,255,0.15);
  --radius: 16px;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body { height:100%; overflow:hidden; }

body {
  font-family: 'Source Sans 3', 'Source Sans Pro', system-ui, sans-serif;
  color: var(--text-main);
  position: relative;
}

/* ═══ BACKGROUND SCENES ═══ */
.bg-scene {
  position: fixed; inset: 0; z-index: 0;
  background-size: cover; background-position: center;
  transition: opacity 1.2s ease;
  opacity: 0;
}
.bg-scene.active { opacity: 1; }

.scene-day {
  background:
    radial-gradient(ellipse 80% 50% at 55% 35%, rgba(255,255,255,0.4) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 45% 30%, rgba(255,255,255,0.3) 0%, transparent 50%),
    radial-gradient(ellipse 90% 35% at 50% 85%, #4a8c3f 0%, #3d7a35 30%, transparent 60%),
    radial-gradient(ellipse 120% 40% at 50% 95%, #2d6b28 0%, transparent 50%),
    linear-gradient(180deg, #1a8ca0 0%, #2ba3b5 30%, #48b8c8 50%, #7fcfdb 70%, #a8dfe8 85%, #5aab4a 90%, #3d8a35 100%);
}

.scene-sunset {
  background:
    radial-gradient(ellipse 70% 45% at 30% 60%, rgba(255,180,100,0.3) 0%, transparent 60%),
    radial-gradient(ellipse 80% 30% at 50% 85%, #5a3a2a 0%, transparent 50%),
    linear-gradient(180deg, #1a1a3e 0%, #2d1b4e 15%, #6b2fa0 30%, #d4567a 50%, #f4a261 65%, #f7c873 75%, #8b6b4a 88%, #3d2b1a 100%);
}

.scene-night {
  background:
    radial-gradient(1px 1px at 10% 15%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 25% 8%, #fff 50%, transparent 100%),
    radial-gradient(1.5px 1.5px at 40% 22%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 55% 5%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 70% 18%, #fff 50%, transparent 100%),
    radial-gradient(1.5px 1.5px at 85% 12%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 15% 35%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 90% 30%, #fff 50%, transparent 100%),
    radial-gradient(1.5px 1.5px at 60% 40%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 33% 45%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 78% 38%, #fff 50%, transparent 100%),
    radial-gradient(ellipse 50% 30% at 80% 15%, rgba(200,180,255,0.08) 0%, transparent 100%),
    radial-gradient(circle at 85% 12%, #FFFDE7 0%, rgba(255,253,231,0.3) 3%, transparent 6%),
    radial-gradient(ellipse 90% 30% at 50% 90%, #0a1628 0%, transparent 50%),
    linear-gradient(180deg, #05080f 0%, #0a1225 25%, #111d3a 50%, #162040 70%, #0f1a30 100%);
}

.scene-rain {
  background:
    radial-gradient(ellipse 100% 30% at 50% 90%, #2a3040 0%, transparent 50%),
    linear-gradient(180deg, #3a4050 0%, #4a5565 20%, #5a6575 40%, #6a7585 60%, #4a5565 80%, #3a4555 100%);
}

.bg-overlay {
  position: fixed; inset: 0; z-index: 1;
  background: var(--bg-overlay);
  pointer-events: none;
}

/* ═══ MAIN LAYOUT ═══ */
.landing-container {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100vh; padding: 2rem;
  text-align: center;
}

/* ═══ TOP BAR ═══ */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 1.8rem 2.2rem;
  pointer-events: none;
}
.top-bar > * { pointer-events: auto; }

.brand {
  display: flex; flex-direction: column; gap: 2px;
}
.brand-name {
  font-family: 'Source Code Pro', monospace;
  font-size: 0.8rem;
  font-weight: 600;
  color: #fff;
  text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.brand-sub {
  font-family: 'Source Code Pro', monospace;
  font-size: 0.5rem;
  font-weight: 400;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: lowercase;
}

.quote-box {
  max-width: 280px;
  text-align: right;
  font-family: 'Source Serif 4', 'Georgia', serif;
  font-size: 1rem;
  font-weight: 500;
  font-style: italic;
  color: #fff;
  text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  line-height: 1.5;
}

/* ═══ CENTER CONTENT ═══ */
.greeting {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 1.5rem;
  font-weight: 600;
  color: #fff;
  text-shadow: 0 2px 16px rgba(0,0,0,0.35);
  margin-bottom: 0.3rem;
  line-height: 1.4;
  opacity: 0; animation: fadeUp 0.8s ease 0.3s forwards;
}

.clock {
  font-family: 'Source Sans 3', sans-serif;
  font-size: clamp(5rem, 14vw, 10rem);
  font-weight: 700;
  color: #fff;
  text-shadow: 0 4px 30px rgba(0,0,0,0.35);
  letter-spacing: -4px;
  line-height: 1;
  margin-bottom: 0.5rem;
  opacity: 0; animation: fadeUp 0.8s ease 0.5s forwards;
}

.enter-btn {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 1.1rem;
  font-weight: 600;
  padding: 14px 48px;
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 50px;
  background: rgba(255,255,255,0.12);
  color: #fff;
  cursor: pointer;
  backdrop-filter: blur(12px);
  transition: all 0.3s ease;
  text-decoration: none;
  display: inline-flex; align-items: center; gap: 8px;
  text-shadow: 0 1px 8px rgba(0,0,0,0.2);
  opacity: 0; animation: fadeUp 0.8s ease 0.7s forwards;
}
.enter-btn:hover {
  background: rgba(255,255,255,0.22);
  border-color: rgba(255,255,255,0.6);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.enter-btn:active { transform: translateY(0); }

/* ═══ BOTTOM BAR ═══ */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  display: flex; justify-content: space-between; align-items: flex-end;
  padding: 1.5rem 2rem;
  pointer-events: none;
}
.bottom-bar > * { pointer-events: auto; }

.glass-pill {
  display: flex; align-items: center; gap: 4px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 4px;
  backdrop-filter: blur(16px);
}
.pill-opt {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.25s ease;
}
.pill-opt:hover { color: #fff; background: var(--glass-hover); }
.pill-opt.active {
  background: rgba(255,255,255,0.2);
  color: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.pill-opt svg { width: 16px; height: 16px; }

.theme-label {
  font-family: 'Source Code Pro', monospace;
  font-size: 0.5rem;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-align: center;
  margin-top: 6px;
}

.bottom-group {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.bottom-group-left {
  display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
}

/* ═══ RAIN EFFECT ═══ */
.rain-container {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  overflow: hidden; display: none;
}
.rain-container.active { display: block; }
.raindrop {
  position: absolute; top: -20px;
  width: 1px; background: linear-gradient(transparent, rgba(200,210,230,0.3));
  animation: rainFall linear infinite;
}
@keyframes rainFall {
  to { transform: translateY(105vh); }
}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Landing retro toggle - COMFY glass style */
.bottom-group-left .retro-toggle {
  font-family: 'Source Code Pro', monospace !important;
  font-size: 0.6rem !important;
  font-weight: 600 !important;
  padding: 8px 20px !important;
  border: 1px solid var(--glass-border) !important;
  border-radius: 24px !important;
  background: var(--glass) !important;
  color: var(--text-dim) !important;
  cursor: pointer !important;
  backdrop-filter: blur(16px) !important;
  letter-spacing: 1.5px !important;
  text-transform: uppercase !important;
  transition: all 0.25s ease !important;
  margin-left: 0 !important;
}
.bottom-group-left .retro-toggle:hover {
  background: var(--glass-hover) !important;
  color: #fff !important;
  border-color: rgba(255,255,255,0.3) !important;
}

/* ═══ LANDING RETRO OVERRIDES ═══ */
body.retro-dark .bg-overlay,
body.retro-light .bg-overlay {
  background: rgba(0,0,0,0.5) !important;
}

body.retro-dark .clock,
body.retro-light .clock {
  font-family: VT323, monospace !important;
  color: var(--rgold, #f5c518) !important;
  text-shadow: 0 0 30px rgba(245,197,24,.4), 0 4px 30px rgba(0,0,0,.5) !important;
}

body.retro-dark .greeting,
body.retro-light .greeting {
  font-family: 'Space Mono', monospace !important;
  color: var(--rpixel, #e8f0ff) !important;
}

body.retro-dark .brand-name,
body.retro-light .brand-name {
  font-family: VT323, monospace !important;
  color: var(--rgold, #f5c518) !important;
  text-shadow: 0 0 20px rgba(245,197,24,.4) !important;
}

body.retro-dark .brand-sub,
body.retro-light .brand-sub {
  font-family: 'Space Mono', monospace !important;
  color: var(--rdim, #7a8faa) !important;
}

body.retro-dark .quote-box,
body.retro-light .quote-box {
  font-family: 'Space Mono', monospace !important;
  font-style: normal !important;
}

body.retro-dark .enter-btn,
body.retro-light .enter-btn {
  font-family: 'Space Mono', monospace !important;
  background: transparent !important;
  border: 2px solid var(--rborder, #1e3a6e) !important;
  border-radius: 0 !important;
  backdrop-filter: none !important;
  color: var(--rpixel, #e8f0ff) !important;
}

body.retro-dark .enter-btn:hover,
body.retro-light .enter-btn:hover {
  border-color: var(--rgold, #f5c518) !important;
  color: var(--rgold, #f5c518) !important;
  box-shadow: 0 0 12px rgba(245,197,24,.4), 4px 4px 0 rgba(245,197,24,.3) !important;
  transform: none !important;
}

body.retro-dark .glass-pill,
body.retro-light .glass-pill {
  background: transparent !important;
  border: 2px solid var(--rborder, #1e3a6e) !important;
  border-radius: 0 !important;
  backdrop-filter: none !important;
}

body.retro-dark .pill-opt,
body.retro-light .pill-opt {
  border-radius: 0 !important;
  color: var(--rdim, #7a8faa) !important;
}

body.retro-dark .pill-opt.active,
body.retro-light .pill-opt.active {
  background: var(--rgold, #f5c518) !important;
  color: #000 !important;
  box-shadow: 0 0 8px rgba(245,197,24,.4) !important;
}

body.retro-dark .pill-opt:hover,
body.retro-light .pill-opt:hover {
  color: var(--rgold, #f5c518) !important;
  background: rgba(245,197,24,.1) !important;
}

body.retro-dark .theme-label,
body.retro-light .theme-label {
  font-family: 'Space Mono', monospace !important;
  color: var(--rdim, #7a8faa) !important;
}

body.retro-dark .bottom-group-left .retro-toggle,
body.retro-light .bottom-group-left .retro-toggle {
  border-radius: 0 !important;
  backdrop-filter: none !important;
}

@media (max-width: 600px) {
  .top-bar { padding: 1.2rem 1.2rem; }
  .quote-box { font-size: 0.85rem; max-width: 180px; }
  .greeting { font-size: 1.2rem; }
  .clock { letter-spacing: -2px; }
  .enter-btn { padding: 12px 36px; font-size: 1rem; }
  .bottom-bar { padding: 1rem 1.2rem; }
}
</style>
</head>
<body data-scene="auto">

<!-- Background Scenes -->
<div class="bg-scene scene-day" id="sceneDay"></div>
<div class="bg-scene scene-sunset" id="sceneSunset"></div>
<div class="bg-scene scene-night active" id="sceneNight"></div>
<div class="bg-scene scene-rain" id="sceneRain"></div>
<div class="bg-overlay"></div>

<div class="rain-container" id="rainContainer"></div>

<!-- Top Bar -->
<div class="top-bar">
  <div class="brand">
    <div class="brand-name">RETROMYND</div>
    <div class="brand-sub">study hub</div>
  </div>
  <div class="quote-box" id="quoteBox"></div>
</div>

<!-- Center -->
<div class="landing-container">
  <div class="greeting" id="greeting"></div>
  <div class="clock" id="clock"></div>
  <a href="/login.html" class="enter-btn" id="enterBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    Entrar no Hub
  </a>
</div>

<!-- Bottom Bar -->
<div class="bottom-bar">
  <!-- Left: RETRO/COMFY toggle -->
  <div class="bottom-group-left">
    <button class="retro-toggle" onclick="toggleRetroMode()">RETRO</button>
    <div class="theme-label">ESTILO</div>
  </div>

  <div class="bottom-group">
    <div class="glass-pill" id="scenePill">
      <button class="pill-opt active" data-sc="auto" title="Auto" onclick="setScene('auto')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>
      <button class="pill-opt" data-sc="day" title="Dia" onclick="setScene('day')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>
      </button>
      <button class="pill-opt" data-sc="sunset" title="Pôr do Sol" onclick="setScene('sunset')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a5 5 0 0 0-10 0"/><line x1="12" y1="9" x2="12" y2="2"/><line x1="4.22" y1="10.22" x2="5.64" y2="11.64"/><line x1="1" y1="18" x2="3" y2="18"/><line x1="21" y1="18" x2="23" y2="18"/><line x1="18.36" y1="11.64" x2="19.78" y2="10.22"/><line x1="23" y1="22" x2="1" y2="22"/></svg>
      </button>
      <button class="pill-opt" data-sc="night" title="Noite" onclick="setScene('night')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="pill-opt" data-sc="rain" title="Chuva" onclick="setScene('rain')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="16" y1="13" x2="16" y2="21"/><line x1="8" y1="13" x2="8" y2="21"/><line x1="12" y1="15" x2="12" y2="23"/><path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/></svg>
      </button>
    </div>
    <div class="theme-label">CENÁRIO</div>
  </div>
</div>

<script>
const quotes = [
  '"Success all depends on the second letter."',
  '"The only way to do great work is to love what you do."',
  '"Don\'t watch the clock; do what it does. Keep going."',
  '"Study hard what interests you the most in the most undisciplined, irreverent way possible."',
  '"The beautiful thing about learning is that nobody can take it away from you."',
  '"It does not matter how slowly you go as long as you do not stop."',
  '"A person who never made a mistake never tried anything new."',
  '"Education is the most powerful weapon you can use to change the world."',
  '"The expert in anything was once a beginner."',
  '"Push yourself, because no one else is going to do it for you."',
  '"Dream big. Start small. Act now."',
  '"Code is like humor. When you have to explain it, it\'s bad."',
  '"First, solve the problem. Then, write the code."',
  '"Talk is cheap. Show me the code."',
];

function setQuote() {
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById('quoteBox').textContent = q;
}
setQuote();

function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2, '0');
  const m = now.getMinutes().toString().padStart(2, '0');
  document.getElementById('clock').textContent = h + ':' + m;
  return now;
}

function updateGreeting() {
  const now = new Date();
  const h = now.getHours();
  const days = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const day = days[now.getDay()];
  let period = 'Boa noite';
  if (h >= 5 && h < 12) period = 'Bom dia';
  else if (h >= 12 && h < 18) period = 'Boa tarde';

  let name = localStorage.getItem('rmUserName') || '';
  if (!name) {
    try {
      const rmsUser = JSON.parse(localStorage.getItem('rms_user') || '{}');
      name = rmsUser.name || '';
    } catch(e) {}
  }
  const nameStr = name ? ', ' + name.split(' ')[0] : '';
  document.getElementById('greeting').innerHTML = period + nameStr + '!<br>Ready for ' + day + '? You\'ve got this!';
}

updateClock();
updateGreeting();
setInterval(updateClock, 1000);
setInterval(updateGreeting, 60000);

let currentScene = localStorage.getItem('landingScene') || 'auto';

function getAutoScene() {
  const h = new Date().getHours();
  if (h >= 6 && h < 17) return 'day';
  if (h >= 17 && h < 20) return 'sunset';
  return 'night';
}

function applyScene(scene) {
  const actual = scene === 'auto' ? getAutoScene() : scene;
  document.querySelectorAll('.bg-scene').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('scene' + actual.charAt(0).toUpperCase() + actual.slice(1));
  if (el) el.classList.add('active');

  const rc = document.getElementById('rainContainer');
  if (actual === 'rain') {
    rc.classList.add('active');
    if (!rc.children.length) createRain();
  } else {
    rc.classList.remove('active');
  }

  document.querySelectorAll('#scenePill .pill-opt').forEach(b => {
    b.classList.toggle('active', b.dataset.sc === scene);
  });
}

function setScene(scene) {
  currentScene = scene;
  localStorage.setItem('landingScene', scene);
  applyScene(scene);
}

function createRain() {
  const rc = document.getElementById('rainContainer');
  for (let i = 0; i < 80; i++) {
    const drop = document.createElement('div');
    drop.className = 'raindrop';
    drop.style.left = Math.random() * 100 + '%';
    drop.style.height = (15 + Math.random() * 20) + 'px';
    drop.style.animationDuration = (0.4 + Math.random() * 0.6) + 's';
    drop.style.animationDelay = Math.random() * 2 + 's';
    drop.style.opacity = 0.2 + Math.random() * 0.3;
    rc.appendChild(drop);
  }
}

applyScene(currentScene);
setInterval(() => { if (currentScene === 'auto') applyScene('auto'); }, 300000);

(function() {
  const token = localStorage.getItem('token');
  const session = localStorage.getItem('sb-session') || localStorage.getItem('supabase.auth.token');
  if (token || session) {
    document.getElementById('enterBtn').href = '/index.html';
    document.getElementById('enterBtn').innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Abrir Study Hub';
  }
})();
</script>
<script src="/js/retro-mode.js"></script>
</body>
</html>
