<!-- RetroMynd Music Player -->
<div id="rm-player" class="nb" style="position: fixed; bottom: 20px; right: 20px; width: 320px; z-index: 999; max-width: calc(100vw - 40px);">
  <!-- Notebook holes -->
  <div class="nb-holes">
    <div class="nb-hole"></div>
    <div class="nb-hole"></div>
    <div class="nb-hole"></div>
  </div>
  
  <!-- Player header -->
  <div class="nb-header">
    <h2 style="font-size: 14px; font-weight: 700; margin: 0;">🎵 lo-fi player</h2>
    <span class="nb-tag tag-pink pixel">BETA</span>
  </div>
  
  <!-- Player body -->
  <div class="nb-body" style="padding: 16px 22px 16px 52px;">
    <!-- Track title -->
    <div id="rm-track-title" style="font-size: 12px; color: var(--text-mid); margin-bottom: 12px; line-height: 1.4; min-height: 34px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">
      Loading player...
    </div>
    
    <!-- Pixel divider -->
    <div class="px-div"></div>
    
    <!-- Controls -->
    <div style="display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 12px;">
      <button id="rm-prev" class="postit-btn" style="padding: 8px 12px; font-size: 16px; background: var(--postit-pink); color: var(--pink); border: 1px solid var(--pink); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;" aria-label="Anterior">
        ⏮
      </button>
      
      <button id="rm-play" class="postit-btn" style="padding: 8px 12px; font-size: 20px; background: var(--postit-yellow); color: var(--text); border: 1px solid #E5DFC0; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;" aria-label="Tocar">
        ▶
      </button>
      
      <button id="rm-next" class="postit-btn" style="padding: 8px 12px; font-size: 16px; background: var(--postit-mint); color: var(--text); border: 1px solid #A0E7C9; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;" aria-label="Próximo">
        ⏭
      </button>
    </div>
    
    <!-- YouTube player (hidden) -->
    <div id="yt-player" style="display: none;"></div>
  </div>
</div>

<!-- Load music player script -->
<script src="/js/music-player.js"></script>
