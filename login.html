<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetroMynd — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/midnight-theme.css">
<style>
:root{--bg:#EEF4FB;--paper:#FFFDF8;--paper-line:#E8E4DF;--paper-margin:#FFB3C6;--pink:#FF6B9D;--pink-soft:#FFE4EE;--pink-hover:#FF4F88;--blue:#6DBDE8;--blue-soft:#E3F2FD;--blue-deep:#4A9BC7;--lavender:#C4B5FD;--lavender-soft:#F0ECFF;--mint:#A7F3D0;--mint-soft:#ECFDF5;--text:#1E293B;--text-mid:#475569;--text-light:#94A3B8;--border:#E2E8F0;--line-h:32px;--radius:6px;--shadow:0 1px 3px rgba(0,0,0,.05),0 4px 14px rgba(0,0,0,.04);--shadow-hover:0 2px 8px rgba(0,0,0,.07),0 8px 28px rgba(0,0,0,.05)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3','Source Sans Pro',system-ui,sans-serif;font-size:16px;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-weight:400;display:flex;flex-direction:column;align-items:center;justify-content:center}
.stars{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.star{position:absolute;width:4px;height:4px;border-radius:1px;opacity:.15;animation:blink var(--dur,3s) ease-in-out infinite var(--delay,0s)}
.star:nth-child(odd){background:var(--pink)}
.star:nth-child(even){background:var(--blue)}
@keyframes blink{0%,100%{opacity:.1;transform:scale(1)}50%{opacity:.35;transform:scale(var(--scale,1.2))}}
.pixel-heart{width:70px;height:70px;display:grid;grid-template-columns:repeat(9,1fr);gap:1px;margin-bottom:20px;animation:hb 2s ease-in-out infinite}
.ph{width:100%;aspect-ratio:1;border-radius:1px}
.ph.p{background:var(--pink)}.ph.t{background:transparent}.ph.w{background:rgba(255,255,255,.6)}
@keyframes hb{0%,100%{transform:scale(1)}15%{transform:scale(1.08)}30%{transform:scale(1)}45%{transform:scale(1.05)}60%{transform:scale(1)}}
.login-card{position:relative;z-index:1;width:100%;max-width:420px;background:var(--paper);border:1px solid #E5E0DA;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-holes{display:none}
.card-header{padding:20px 22px 10px 22px;position:relative}
.card-header::before{display:none}
.card-header h1{font-family:'Source Serif 4','Georgia',serif;font-size:28px;font-weight:700;color:var(--pink);text-shadow:none}
.card-header p{font-family:'Source Sans 3',sans-serif;font-size:14px;color:var(--text-light);margin-top:2px}
.card-body{padding:10px 22px 28px 22px;position:relative;background:var(--paper)}
.card-body::before{display:none}
.saved-user{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--lavender-soft);border-radius:8px;margin-bottom:14px;cursor:pointer;transition:all .2s;border:2px solid transparent}
.saved-user:hover{border-color:var(--lavender);transform:translateY(-1px);box-shadow:var(--shadow-hover)}
.saved-avatar{width:40px;height:40px;border-radius:50%;background:var(--pink-soft);display:flex;align-items:center;justify-content:center;font-size:18px}
.saved-name{font-size:16px;font-weight:600;color:var(--text)}
.saved-email{font-size:13px;color:var(--text-light)}
.saved-or{text-align:center;font-size:13px;color:var(--text-light);margin-bottom:12px}
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{flex:1;font-family:'Source Sans 3',sans-serif;font-size:15px;font-weight:600;padding:8px;border:none;border-radius:4px;cursor:pointer;transition:all .15s;background:#FFF9C4;color:var(--text-mid)}
.tab:hover{transform:translateY(-1px)}
.tab.on{background:var(--pink);color:#fff;box-shadow:0 2px 8px rgba(255,107,157,.3)}
.field{margin-bottom:10px}
.field input{width:100%;font-family:'Source Sans 3',sans-serif;font-size:16px;font-weight:400;padding:10px 14px;border:1px solid var(--paper-line);border-radius:6px;background:rgba(255,255,255,.8);color:var(--text);outline:none;transition:border .2s,box-shadow .2s}
.field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(109,189,232,.15)}
.field input::placeholder{color:var(--text-light)}
.field-name{display:none}
.field-name.show{display:block}
.login-btn{width:100%;font-family:'Source Sans 3',sans-serif;font-size:17px;font-weight:600;padding:12px;border:none;border-radius:8px;background:var(--pink);color:#fff;cursor:pointer;box-shadow:0 3px 12px rgba(255,107,157,.3);transition:all .2s;margin-top:4px}
.login-btn:hover{background:var(--pink-hover);transform:translateY(-2px);box-shadow:0 5px 20px rgba(255,107,157,.4)}
.login-btn:active{transform:translateY(1px)}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.msg{text-align:center;font-size:14px;min-height:20px;margin-top:10px;transition:all .2s}
.msg.err{color:var(--pink)}
.msg.info{color:var(--blue)}
.card-footer{text-align:center;padding:12px;border-top:1px dashed var(--paper-line)}
.card-footer span{font-family:'Source Code Pro',monospace;font-size:7px;font-weight:500;color:var(--text-light);letter-spacing:1.5px;text-transform:uppercase}
.brand{position:relative;z-index:1;margin-bottom:6px}
.brand span{font-family:'Source Code Pro',monospace;font-size:8px;font-weight:500;color:var(--blue);letter-spacing:3px;opacity:.5;text-transform:uppercase}
.lyric{position:relative;z-index:1;font-family:'Source Serif 4','Georgia',serif;font-size:14px;font-style:italic;font-weight:400;color:var(--text-light);letter-spacing:.3px;margin-bottom:24px;text-align:center}
.bottom-text{position:fixed;bottom:20px;font-family:'Source Code Pro',monospace;font-size:7px;font-weight:500;color:var(--text-light);letter-spacing:2px;opacity:.3;z-index:1;text-transform:uppercase}
.diag-box{margin-top:14px;padding:12px;background:#f8f8f0;border:1px dashed var(--paper-line);border-radius:6px;font-family:'Source Code Pro',monospace;font-size:11px;color:var(--text-mid);white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;display:none}
.diag-box.show{display:block}
.diag-link{text-align:center;margin-top:10px}
.diag-link a{font-size:12px;color:var(--blue-deep);text-decoration:underline;cursor:pointer}
@media(max-width:480px){
  body{padding:16px}
  .login-card{max-width:100%}
  .card-header h1{font-size:24px}
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="brand"><span>RETROMYND</span></div>

<div class="pixel-heart">
  <div class="ph t"></div><div class="ph p"></div><div class="ph p"></div><div class="ph t"></div><div class="ph t"></div><div class="ph t"></div><div class="ph p"></div><div class="ph p"></div><div class="ph t"></div>
  <div class="ph p"></div><div class="ph w"></div><div class="ph p"></div><div class="ph p"></div><div class="ph t"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div>
  <div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div>
  <div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div>
  <div class="ph t"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph t"></div>
  <div class="ph t"></div><div class="ph t"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph t"></div><div class="ph t"></div>
  <div class="ph t"></div><div class="ph t"></div><div class="ph t"></div><div class="ph p"></div><div class="ph p"></div><div class="ph p"></div><div class="ph t"></div><div class="ph t"></div><div class="ph t"></div>
  <div class="ph t"></div><div class="ph t"></div><div class="ph t"></div><div class="ph t"></div><div class="ph p"></div><div class="ph t"></div><div class="ph t"></div><div class="ph t"></div><div class="ph t"></div>
</div>

<div class="lyric">“long story short, I survived”</div>

<div class="login-card">
  <div class="card-holes"></div>

  <div class="card-header">
    <h1>Study Hub</h1>
    <p>Seu caderninho de estudos</p>
  </div>

  <div class="card-body">
    <div id="savedUser"></div>

    <div class="tabs">
      <button class="tab on" id="tabLogin" onclick="switchMode('login')">Login</button>
      <button class="tab" id="tabRegister" onclick="switchMode('register')">Cadastrar</button>
    </div>

    <div class="field field-name" id="nameField">
      <input type="text" id="inputName" placeholder="Seu nome" autocomplete="name">
    </div>

    <div class="field">
      <input type="email" id="inputEmail" placeholder="Email" autocomplete="email">
    </div>

    <div class="field">
      <input type="password" id="inputPass" placeholder="Senha (mín. 6 caracteres)" autocomplete="current-password">
    </div>

    <button class="login-btn" id="submitBtn" onclick="doSubmit()">Entrar</button>

    <div class="msg" id="msg"></div>

    <div class="diag-box" id="diagBox"></div>
    <div class="diag-link"><a onclick="runDiag()">🔧 Diagnóstico</a></div>
  </div>

  <div class="card-footer">
    <span>POWERED BY SUPABASE</span>
  </div>
</div>

<div class="bottom-text">RETROMYND © 2026 • MATHEUS MARQUES</div>

<script>
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<50;i++){
    const s=document.createElement('div');
    s.className='star';
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    s.style.setProperty('--dur',(2+Math.random()*3)+'s');
    s.style.setProperty('--delay',Math.random()*3+'s');
    s.style.setProperty('--scale',(1.1+Math.random()*0.4));
    c.appendChild(s);
  }
})();

(function(){
  const token = localStorage.getItem('token');
  const user = localStorage.getItem('rms_user');
  if(token && user){
    window.location.href = '/index.html';
    return;
  }
  if(user){
    try{
      const u = JSON.parse(user);
      const el = document.getElementById('savedUser');
      if(el && u.name){
        el.innerHTML = `
          <div class="saved-user" onclick="quickLogin()">
            <div class="saved-avatar">♥</div>
            <div>
              <div class="saved-name">${u.name}</div>
              <div class="saved-email">${u.email||''}</div>
            </div>
          </div>
          <div class="saved-or">ou entre com outra conta</div>
        `;
      }
    }catch(e){}
  }
})();

function quickLogin(){
  if(localStorage.getItem('token')) window.location.href = '/index.html';
}

let mode = 'login';

function switchMode(m){
  mode = m;
  const tl = document.getElementById('tabLogin');
  const tr = document.getElementById('tabRegister');
  const nf = document.getElementById('nameField');
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');
  if(m==='register'){
    tl.classList.remove('on'); tr.classList.add('on');
    nf.classList.add('show');
    btn.textContent = 'Cadastrar';
  } else {
    tl.classList.add('on'); tr.classList.remove('on');
    nf.classList.remove('show');
    btn.textContent = 'Entrar';
  }
  if(msg) msg.textContent = '';
}

async function doSubmit(){
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');
  const diag = document.getElementById('diagBox');
  const email = document.getElementById('inputEmail').value.trim();
  const pass = document.getElementById('inputPass').value;
  const name = document.getElementById('inputName').value.trim();

  if(!email || !pass){
    msg.className='msg err'; msg.textContent='Preencha email e senha'; return;
  }
  if(mode==='register' && !name){
    msg.className='msg err'; msg.textContent='Preencha seu nome'; return;
  }
  if(mode==='register' && pass.length < 6){
    msg.className='msg err'; msg.textContent='Senha deve ter pelo menos 6 caracteres'; return;
  }

  btn.disabled = true;
  msg.className='msg info';
  msg.textContent = mode==='login' ? 'Conectando ao servidor...' : 'Cadastrando...';
  diag.classList.remove('show');

  try{
    const endpoint = mode==='login' ? '/api/auth/login' : '/api/auth/register';
    const body = mode==='login' ? {email, password:pass} : {email, password:pass, name};

    const t0 = Date.now();
    const res = await fetch(endpoint, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const elapsed = Date.now() - t0;

    let data;
    const rawText = await res.text();
    try {
      data = JSON.parse(rawText);
    } catch(parseErr) {
      diag.textContent = `Status: ${res.status}\nTempo: ${elapsed}ms\nResposta (não é JSON):\n${rawText.substring(0, 500)}`;
      diag.classList.add('show');
      throw new Error(`Servidor retornou status ${res.status} (não-JSON). Veja detalhes abaixo.`);
    }

    if(!res.ok){
      diag.textContent = `Status: ${res.status}\nTempo: ${elapsed}ms\nResposta:\n${JSON.stringify(data, null, 2)}`;
      diag.classList.add('show');
      throw new Error(data.error || data.message || `Erro ${res.status}`);
    }

    localStorage.setItem('token', data.token);
    localStorage.setItem('rms_user', JSON.stringify(data.user));

    msg.className='msg info';
    msg.textContent = `✅ Login OK! (${elapsed}ms) Entrando...`;

    setTimeout(()=>{ window.location.href = '/index.html'; }, 400);

  } catch(e){
    msg.className='msg err';
    if(e.name === 'TypeError' && e.message.includes('fetch')){
      msg.textContent = '❌ Sem conexão com o servidor. Verifique sua internet.';
      diag.textContent = `Erro de rede (fetch failed):\n${e.message}\n\nIsso significa que o navegador não conseguiu se conectar ao servidor Vercel.`;
      diag.classList.add('show');
    } else {
      msg.textContent = e.message || 'Erro ao conectar';
    }
    btn.disabled = false;
  }
}

async function runDiag(){
  const diag = document.getElementById('diagBox');
  diag.classList.add('show');
  diag.textContent = '🔧 Rodando diagnóstico...\n\n';
  let log = '';
  function add(text){ log += text + '\n'; diag.textContent = log; }
  add('=== RetroMynd Diagnostic ===');
  add('Time: ' + new Date().toLocaleString());
  add('URL: ' + window.location.href);
  add('');
  const token = localStorage.getItem('token');
  add('Token: ' + (token ? 'exists (' + token.length + ' chars)' : 'NONE'));
  add('User: ' + (localStorage.getItem('rms_user') ? 'exists' : 'NONE'));
  add('');
  add('--- Health Check ---');
  try { const t0=Date.now(); const r=await fetch('/api/health'); const ms=Date.now()-t0; const d=await r.json(); add('Status: '+r.status+' ('+ms+'ms)'); Object.entries(d).forEach(([k,v])=>add('  '+k+': '+v)); } catch(e){ add('FAILED: '+e.message); }
  add('');
  add('--- Login Preflight ---');
  try { const t0=Date.now(); const r=await fetch('/api/auth/login',{method:'OPTIONS'}); const ms=Date.now()-t0; add('OPTIONS: '+r.status+' ('+ms+'ms)'); } catch(e){ add('OPTIONS FAILED: '+e.message); }
  add('');
  add('--- Login Test (bad creds) ---');
  try { const t0=Date.now(); const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:'test@diag.com',password:'wrong123'})}); const ms=Date.now()-t0; const d=await r.text(); add('Status: '+r.status+' ('+ms+'ms)'); add('Response: '+d.substring(0,200)); } catch(e){ add('FAILED: '+e.message); }
  add('');
  add('--- localStorage ---');
  const keys=[]; for(let i=0;i<localStorage.length;i++) keys.push(localStorage.key(i));
  add('Keys: '+(keys.join(', ')||'(empty)'));
  add(''); add('=== Done ===');
}

document.getElementById('inputPass').addEventListener('keydown',function(e){ if(e.key==='Enter') doSubmit(); });
document.getElementById('inputEmail').addEventListener('keydown',function(e){ if(e.key==='Enter') document.getElementById('inputPass').focus(); });
</script>
<script src="/js/midnight-mode.js"></script>
</body>
</html>
